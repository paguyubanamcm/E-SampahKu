<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-SampahKu AMCM</title>
  
  <!-- Framework & Google Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { --primary: #1e40af; --secondary: #3b82f6; --bg: #f8fafc; --white: #ffffff; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }

    /* --- LOGIN PAGE --- */
    #login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://freedomdigital.biz.id/gambarbebas/20260328-102840_GATE%20AMC%201%20&%20AMC%202.png');
      background-size: cover; background-position: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
    }
    .login-card {
      background: white; border-radius: 30px; padding: 40px; width: 100%; max-width: 450px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 4px solid var(--primary);
    }
    .warning-box { display: none; background: #ff3b00; color: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; border: 2px solid #000; }

    /* --- APP LAYOUT --- */
    #app-page { display: none; }
    .sidebar { width: 280px; height: 100vh; position: fixed; background: var(--white); border-right: 1px solid #e2e8f0; z-index: 1000; }
    .main-content { margin-left: 280px; padding: 30px; min-height: 100vh; }
    .nav-link-custom { display: flex; align-items: center; padding: 12px 20px; color: #64748b; text-decoration: none; border-radius: 12px; margin: 4px 15px; font-weight: 600; cursor: pointer; }
    .nav-link-custom.active { background: var(--primary); color: white; }

    /* --- LOADER --- */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    <h5 class="mt-3 fw-bold text-primary">Memproses Data...</h5>
  </div>

  <!-- PAGE: LOGIN -->
  <div id="login-page">
    <div class="login-card">
      <div id="warnCard" class="warning-box">
        <h5 class="fw-bold mb-1">⚠️ WARNING !!! 😡</h5>
        <small class="fw-bold">BRO ANDA WARGA AMCM BUKAN ??</small>
      </div>
      <div class="text-center">
        <img src="https://freedomdigital.biz.id/gambarbebas/20260311-014657_Paguyuban_Ahsana_Modern_City_Mojosari.png" width="120" alt="Logo">
        <h3 class="fw-bold text-primary mt-3">E-SampahKu</h3>
        <p class="text-muted small mb-4">Ahsana Modern City Mojosari</p>
      </div>
      <form id="formLogin">
        <input type="email" id="loginEmail" class="form-control mb-3 py-3 rounded-4" placeholder="Email Anda" required>
        <input type="password" id="loginPass" class="form-control mb-4 py-3 rounded-4" placeholder="Password" required>
        <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold shadow">MASUK SISTEM</button>
      </form>
    </div>
  </div>

  <!-- PAGE: MAIN APP -->
  <div id="app-page">
    <div class="sidebar">
      <div class="p-4 text-center">
        <img id="userFoto" class="rounded-circle mb-3 shadow-sm" width="80" height="80" style="object-fit:cover; border: 3px solid var(--primary);" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        <h6 class="fw-bold mb-0" id="userNama">User</h6>
        <span class="badge bg-primary-subtle text-primary mt-2" id="userRole">ROLE</span>
      </div>
      <nav class="mt-3">
        <div class="nav-link-custom active" onclick="showView('dashboard', this)"><i class="fas fa-home me-2"></i> Dashboard</div>
        <div class="nav-link-custom" id="menuWarga" onclick="showView('warga', this)"><i class="fas fa-users me-2"></i> Data Warga</div>
        <div class="nav-link-custom" id="menuSet" onclick="showView('setting', this)"><i class="fas fa-cog me-2"></i> Pengaturan</div>
        <div class="px-4 mt-4">
            <button class="btn btn-outline-danger w-100 rounded-4 fw-bold" onclick="location.reload()">Log Out</button>
        </div>
      </nav>
    </div>

    <div class="main-content">
      <div id="view-dashboard" class="view-section">
        <h3 class="fw-bold mb-4">Ringkasan Sistem</h3>
        <div id="dashContent">Memuat data...</div>
      </div>
      <div id="view-warga" class="view-section" style="display:none;">
        <h3 class="fw-bold mb-4">Manajemen Warga</h3>
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <table class="table align-middle mb-0">
                <thead class="bg-light">
                    <tr><th>Nama</th><th>Blok/No</th><th>WhatsApp</th><th>Aksi</th></tr>
                </thead>
                <tbody id="listWarga"></tbody>
            </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- GANTI URL INI DENGAN URL DEPLOYMENT GOOGLE APPS SCRIPT LO ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwl8LkiMRNaIf7K9W4j87YuNjNWvpUJ35oMbuhuI3oCAcT-GswRm72KRoA7_DyWgJWSNQ/exec";

    let currentUser = null;

    async function callGAS(funcName, ...args) {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ functionName: funcName, parameters: args })
        });
        const result = await response.json();
        // Sesuai dengan Code.gs: result adalah data langsung, atau objek error
        if (result.status === 'error') throw new Error(result.message);
        return result;
      } catch (err) {
        console.error("Gagal panggil server:", err);
        throw err;
      }
    }

    function toggleLoader(show) {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
    }

    function playWarningVoice() {
      if ('speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance("BRO ANDA WARGA AMCM BUKAN ??");
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
      }
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      
      toggleLoader(true);
      document.getElementById('warnCard').style.display = 'none';

      try {
        const res = await callGAS('prosesLogin', email, pass);
        toggleLoader(false);
        
        if (res && res.status === 'success') {
          currentUser = res.user;
          startApp();
        } else {
          document.getElementById('warnCard').style.display = 'block';
          playWarningVoice();
        }
      } catch (err) {
        toggleLoader(false);
        Swal.fire("Error", "Gagal menghubungi server. Pastikan GAS_URL benar.", "error");
      }
    });

    function startApp() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('app-page').style.display = 'block';
      document.getElementById('userNama').innerText = currentUser.nama;
      document.getElementById('userRole').innerText = currentUser.role.toUpperCase();
      if(currentUser.foto) document.getElementById('userFoto').src = currentUser.foto;
      
      if (currentUser.role === 'warga') {
          document.getElementById('menuWarga').style.display = 'none';
          document.getElementById('menuSet').style.display = 'none';
      }
      showView('dashboard');
    }

    async function showView(view, el) {
        document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + view).style.display = 'block';
        if(el) el.classList.add('active');

        if (view === 'dashboard') {
            const data = await callGAS('getSettings');
            document.getElementById('dashContent').innerHTML = `
                <div class="card p-4 border-0 shadow-sm rounded-4">
                    <h5 class="fw-bold text-primary">Pengumuman</h5>
                    <p>${data.pengumuman || 'Tidak ada pengumuman.'}</p>
                    <hr>
                    <p>Biaya Iuran: <b>Rp ${data.biaya || '0'}</b></p>
                </div>
            `;
        } else if (view === 'warga') {
            renderWarga();
        }
    }

    async function renderWarga() {
        toggleLoader(true);
        const data = await callGAS('getSemuaWarga');
        toggleLoader(false);
        let html = '';
        data.forEach(w => {
            html += `<tr>
                <td>${w.nama}</td>
                <td>${w.blok}/${w.no}</td>
                <td>${w.wa || '-'}</td>
                <td><button class="btn btn-sm btn-outline-primary">Detail</button></td>
            </tr>`;
        });
        document.getElementById('listWarga').innerHTML = html;
    }
  </script>
</body>
</html>
