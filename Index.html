<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-SampahKu AMCM - Mojosari (Floating Theme)</title>
  
  <!-- CSS Library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --primary: #1e3a8a;       
      --primary-dark: #172554;
      --primary-light: #eff6ff;
      --accent: #3b82f6;
      --bg: #f8fafc;
      --text-main: #0f172a;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text-main);
    }

    /* PRELOADER */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.95); z-index: 9999;
      display: none; align-items: center; justify-content: center; flex-direction: column;
    }

    /* LOGIN PAGE */
    #login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      /* BACKGROUND STATIS (FIXED) */
      background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.6)), url('https://freedomdigital.biz.id/gambarbebas/20260328-102840_GATE%20AMC%201%20&%20AMC%202.png');
      background-size: cover; 
      background-position: center; 
      background-attachment: fixed; /* Membuat background tidak ikut scroll */
      padding: 40px 20px;
    }

    /* LOGIN CARD - MELAYANG DENGAN LIS BIRU */
    .login-card {
      background: #ffffff; 
      border-radius: 40px; 
      padding: 50px 40px; 
      width: 100%; 
      max-width: 450px;
      /* Efek Melayang & Bayangan Tebal */
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5); 
      text-align: center;
      /* LIS BIRU KELILING */
      border: 3px solid var(--accent); 
      transition: transform 0.3s ease;
    }
    
    .login-card:hover {
      transform: translateY(-5px); /* Sedikit naik saat hover */
    }
    
    .logo-login {
      width: 280px; height: auto; margin-bottom: 15px;
    }

    /* DASHBOARD LAYOUT */
    #app-page { display: none; }
    .sidebar {
      width: 280px; height: 100vh; background: white; position: fixed;
      left: 0; top: 0; border-right: 1px solid #e2e8f0; z-index: 100;
    }
    .main-content { margin-left: 280px; padding: 40px; }
    
    /* FORM INPUTS */
    .form-control {
      background: #f1f5f9; border: 2px solid transparent; transition: 0.3s;
    }
    .form-control:focus {
      background: #ffffff; border-color: var(--accent); box-shadow: none;
    }

    /* BUTTONS */
    .btn-accent { background: var(--accent); color: white; border: none; font-weight: 700; transition: 0.3s; }
    .btn-accent:hover { background: #2563eb; transform: translateY(-2px); color: white; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

    /* UTILITY */
    .fw-800 { font-weight: 800; }

    @media (max-width: 992px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h6 class="fw-bold text-primary">Sabar sek nggih...</h6>
  </div>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="login-card">
      <!-- LOGO AMCM -->
      <img src="https://freedomdigital.biz.id/gambarbebas/20260311-014657_Paguyuban_Ahsana_Modern_City_Mojosari.png" class="logo-login" alt="Logo AMCM">
      
      <div class="mb-4">
        <h2 class="fw-800 text-primary mb-1" style="letter-spacing: -1px;">E-SampahKu</h2>
        <p class="small text-muted fw-bold">Ahsana Modern City Mojosari</p>
      </div>
      
      <form id="loginForm">
        <div class="mb-3 text-start">
          <label class="small fw-bold ms-2 text-muted">Alamat Email</label>
          <input type="email" id="loginEmail" class="form-control py-3 rounded-4" placeholder="user@amcm.com" required>
        </div>
        <div class="mb-4 text-start">
          <label class="small fw-bold ms-2 text-muted">Password</label>
          <input type="password" id="loginPass" class="form-control py-3 rounded-4" placeholder="******" required>
        </div>
        <button type="submit" class="btn btn-accent w-100 py-3 rounded-4 shadow-sm">MONGGO MLEBET SISTEM</button>
      </form>
    </div>
  </div>

  <!-- APP PAGE -->
  <div id="app-page">
    <div class="sidebar p-4">
      <div class="text-center mb-4">
        <img src="https://freedomdigital.biz.id/gambarbebas/20260311-020158_SampahKu%20AMCM%2001.png" width="140" alt="Logo">
      </div>
      <nav>
        <a href="#" class="nav-link active" style="text-decoration:none; display:block; padding:10px; color:var(--primary); font-weight:bold;"><i class="fas fa-home"></i> Beranda</a>
        <hr>
        <a href="#" class="nav-link text-danger" style="text-decoration:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Metu</a>
      </nav>
    </div>
    <div class="main-content">
        <h3 class="fw-800 mb-0">Dashboard Warga</h3>
        <p class="text-muted">Selamat datang kembali di sistem iuran digital.</p>
    </div>
  </div>

  <script>
    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function logout() { location.reload(); }
    
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      showLoader(true);
      setTimeout(() => {
        showLoader(false);
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('app-page').style.display = 'block';
      }, 1000);
    });
  </script>
</body>
</html>
