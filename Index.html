<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-SampahKu AMCM</title>
  
  <!-- Framework & Google Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #0d6efd; --secondary: #6c757d; --bg: #f8fafc; --white: #ffffff; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      min-height: 100vh;
      margin: 0;
      overflow-y: auto;
    }

    /* --- LOGIN PAGE STYLING --- */
    #login-page {
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 40px 20px;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://freedomdigital.biz.id/gambarbebas/20260328-102840_GATE%20AMC%201%20&%20AMC%202.png');
      background-size: cover; 
      background-position: center;
      background-attachment: fixed;
    }
    
    .login-card {
      background: #ffffff; /* PUTIH BERSIH menyatu dengan logo */
      border-radius: 50px; 
      padding: 50px 40px; 
      width: 100%; 
      max-width: 520px;
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6); 
      border: 3px solid var(--primary); 
      text-align: center;
    }

    /* LOGO: Ukuran mantap agar tulisan "By Totok" terlihat jelas */
    .login-logo {
      width: 280px; 
      height: auto;
      margin-bottom: 25px;
      /* Filter drop-shadow dihilangkan agar menyatu sempurna jika logo punya bg putih */
      transition: transform 0.3s ease;
    }
    .login-logo:hover {
      transform: scale(1.03);
    }

    .app-title {
      font-weight: 800;
      font-size: 2.5rem; 
      letter-spacing: -1px;
      margin-bottom: 5px;
      color: var(--primary);
      text-transform: none; 
    }

    .app-subtitle {
      font-weight: 700;
      font-size: 1rem;
      color: #64748b;
      margin-bottom: 35px;
    }

    /* WARNING BOX - PERSIS SCREENSHOT */
    .warning-box { 
      display: none; 
      background: #ff2a00; 
      color: white; 
      border-radius: 20px; 
      padding: 25px; 
      margin-bottom: 30px; 
      border: 3px solid #000; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: pulse 1.5s infinite;
    }
    .warning-header {
      font-weight: 800;
      font-size: 1.6rem;
      margin-bottom: 15px;
      display: block;
    }
    .warning-main-text {
      font-weight: 800;
      font-size: 1.15rem;
      line-height: 1.4;
      display: block;
      margin-bottom: 10px;
    }
    .warning-sub-text {
      font-weight: 700;
      font-size: 1rem;
      display: block;
    }

    @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

    /* --- LAYOUT UTILS --- */
    #app-page { display: none; }
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }

    @media (max-width: 768px) {
      .login-card { padding: 40px 20px; border-radius: 40px; }
      .app-title { font-size: 2.2rem; }
      .login-logo { width: 220px; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    <h5 class="mt-3 fw-bold text-primary">Memproses...</h5>
  </div>

  <!-- SECTION: LOGIN -->
  <div id="login-page">
    <div class="login-card">
      
      <!-- WARNING BOX PERSIS SCREENSHOT -->
      <div id="warnCard" class="warning-box">
        <span class="warning-header">⚠️ WARNING !!! 😡</span>
        <span class="warning-main-text">
          BRO ANDA WARGA AHSANA MODERN CITY MOJOSARI (AMCM) BUKAN ??
        </span>
        <span class="warning-sub-text">
          Kalau Warga AMCM tau dong harus hubungi siapa Adminnya?
        </span>
      </div>
      
      <!-- LOGO SEKARANG LEBIH BESAR & BACKGROUND MENYATU -->
      <img src="https://freedomdigital.biz.id/gambarbebas/20260311-014657_Paguyuban_Ahsana_Modern_City_Mojosari.png" class="login-logo" alt="Logo AMCM By Totok">
      
      <h1 class="app-title">E-SampahKu</h1>
      <p class="app-subtitle">Ahsana Modern City Mojosari</p>
      
      <form id="loginForm">
        <div class="mb-3 text-start">
          <label class="form-label small fw-bold ps-2 text-muted text-uppercase">Email Akun</label>
          <input type="email" id="loginEmail" class="form-control py-3 rounded-4 border-2" placeholder="nama@email.com" required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label small fw-bold ps-2 text-muted text-uppercase">Password</label>
          <input type="password" id="loginPass" class="form-control py-3 rounded-4 border-2" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 rounded-4 fw-bold fs-5 shadow-lg border-0">
          MASUK SISTEM <i class="fas fa-arrow-right ms-2"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- SECTION: DASHBOARD (Hidden) -->
  <div id="app-page">
    <div class="p-5 text-center">
      <h2 class="fw-bold">Dashboard E-SampahKu</h2>
      <button class="btn btn-danger mt-4" onclick="location.reload()">Keluar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Simpan ini di bagian atas tag script
    const CONFIG = {
      gasUrl: "https://script.google.com/macros/s/GANTI_URL_GAS_LO/exec"
    };

    async function hashPassword(string) {
      const utf8 = new TextEncoder().encode(string);
      const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function speakWarning() {
      if ('speechSynthesis' in window) {
        const text = "Warning. Bro anda warga Ahsana Modern City Mojosari AMCM bukan? Kalau Warga AMCM tau dong harus hubungi siapa Adminnya?";
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'id-ID';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const passRaw = document.getElementById('loginPass').value;
      const passHashed = await hashPassword(passRaw);

      document.getElementById('loader').style.display = 'flex';
      
      try {
        const response = await fetch(CONFIG.gasUrl, {
          method: 'POST',
          body: JSON.stringify({ functionName: 'prosesLogin', parameters: [email, passHashed] })
        });
        const res = await response.json();
        document.getElementById('loader').style.display = 'none';

        if (res.status === 'success') {
          document.getElementById('login-page').style.display = 'none';
          document.getElementById('app-page').style.display = 'block';
        } else {
          document.getElementById('warnCard').style.display = 'block';
          speakWarning();
        }
      } catch (err) {
        document.getElementById('loader').style.display = 'none';
        // Simulasi warning jika koneksi gagal/belum diset
        document.getElementById('warnCard').style.display = 'block';
        speakWarning();
      }
    });
  </script>
</body>
</html>
