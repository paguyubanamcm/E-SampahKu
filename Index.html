<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMPAHKU AMCM - Sistem Iuran Warga</title>
  
  <!-- CSS Frameworks -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --secondary: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --background: #f1f5f9;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--background);
      color: #1e293b;
    }

    /* Overlay Loader */
    #loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Login Screen */
    #login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                  url('https://freedomdigital.biz.id/gambarbebas/20260328-102840_GATE%20AMC%201%20&%20AMC%202.png');
      background-size: cover;
      background-position: center;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Custom Style untuk Judul Gemuk */
    .brand-title {
      font-weight: 900; /* Paling tebal */
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    /* App Layout */
    .sidebar {
      background: white;
      height: 100vh;
      position: sticky;
      top: 0;
      border-right: 1px solid #e2e8f0;
      padding: 24px;
    }

    .nav-link {
      color: var(--secondary);
      font-weight: 600;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-link:hover {
      background: #f8fafc;
      color: var(--primary);
    }

    .nav-link.active {
      background: var(--primary);
      color: white !important;
    }

    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .table th {
      background: #f8fafc;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #64748b;
      padding: 16px;
    }

    @media (max-width: 768px) {
      .sidebar { height: auto; position: relative; border-right: none; }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loader-overlay">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <span class="fw-bold">Mohon Tunggu...</span>
  </div>

  <!-- PAGE: LOGIN -->
  <div id="login-page">
    <div class="login-card shadow-lg">
      <div class="text-center mb-4">
        <img src="https://freedomdigital.biz.id/gambarbebas/20260311-014657_Paguyuban_Ahsana_Modern_City_Mojosari.png" alt="Logo AMC" style="width: 120px;">
        <!-- UPDATE: Judul Branding Lebih Tebal/Gemuk -->
        <h2 class="mt-3 brand-title text-primary">SAMPAHKU AMCM</h2>
        <p class="text-muted small">Kelola iuran kebersihan warga jadi lebih mudah</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label small fw-bold">Email</label>
          <input type="email" id="loginEmail" class="form-control form-control-lg" placeholder="email@contoh.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold">Password</label>
          <input type="password" id="loginPass" class="form-control form-control-lg" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 shadow fw-bold">MASUK SISTEM</button>
      </form>
    </div>
  </div>

  <!-- PAGE: MAIN APP -->
  <div id="app-page" style="display: none;">
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-3 col-lg-2 sidebar">
          <div class="d-flex align-items-center mb-5 gap-2">
             <img src="https://freedomdigital.biz.id/gambarbebas/20260311-014657_Paguyuban_Ahsana_Modern_City_Mojosari.png" style="width: 40px;">
             <span class="brand-title fs-5 text-primary">SAMPAHKU</span>
          </div>
          <nav class="nav flex-column" id="main-nav">
            <a class="nav-link active" onclick="showMenu('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a class="nav-link" id="menu-warga" onclick="showMenu('warga')" style="display: none;"><i class="fas fa-users"></i> Data Warga</a>
            <a class="nav-link" id="menu-pengaturan" onclick="showMenu('pengaturan')" style="display: none;"><i class="fas fa-cog"></i> Pengaturan</a>
            <a class="nav-link" onclick="logout()"><i class="fas fa-sign-out-alt text-danger"></i> Keluar</a>
          </nav>
        </div>

        <!-- CONTENT -->
        <div class="col-md-9 col-lg-10 p-4">
          <!-- View: Dashboard -->
          <div id="view-dashboard" class="view-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="fw-800">Halo, <span id="userNama" class="text-primary">Warga</span>!</h3>
              <div class="badge bg-white text-dark p-2 border shadow-sm">
                <i class="fas fa-user-tag me-1 text-primary"></i> <span id="userRole">Warga</span>
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-md-4 mb-3">
                <div class="card p-4">
                  <small class="text-muted fw-bold">STATUS TAHUN INI</small>
                  <h2 class="fw-800 mb-0 text-success" id="dispStatusTahun">LUNAS</h2>
                </div>
              </div>
              <div class="col-md-8 mb-3">
                <div class="card p-4 bg-primary text-white">
                  <div class="d-flex align-items-center gap-3">
                    <i class="fas fa-bullhorn fs-1"></i>
                    <div>
                      <small class="fw-bold opacity-75">PENGUMUMAN TERBARU</small>
                      <p id="dispPengumuman" class="mb-0 fw-600">Memuat pengumuman...</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card overflow-hidden">
              <div class="card-header bg-white py-3 border-0">
                <h5 class="mb-0 fw-800"><i class="fas fa-receipt me-2 text-primary"></i>Riwayat Iuran <span id="dispTahunSekarang">2024</span></h5>
              </div>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead>
                    <tr>
                      <th class="ps-4">Bulan</th>
                      <th>Tagihan</th>
                      <th>Status</th>
                      <th class="text-center">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-iuran-user"></tbody>
                </table>
              </div>
            </div>
          </div>
          
          <!-- View: Data Warga (Admin) -->
          <div id="view-warga" class="view-section" style="display: none;">
            <!-- Tabel Data Warga sesuai logic_part_2 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="fw-800">Data Warga</h3>
            </div>
            <div class="card">
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead>
                    <tr>
                      <th class="ps-3">Profil</th>
                      <th>Rumah</th>
                      <th>WA</th>
                      <th>Role</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-warga"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // SISIPAN BRIDGE UNTUK VERCEL/GAS
    const CONFIG = {
        gasUrl: "MASUKKAN_URL_WEB_APP_GAS_LO_DISINI",
        isHosting: window.location.hostname !== 'script.google.com' 
    };

    async function callGAS(funcName, ...args) {
        if (!CONFIG.isHosting) {
            return new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(reject)[funcName](...args);
            });
        } else {
            try {
                const response = await fetch(CONFIG.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ functionName: funcName, parameters: args })
                });
                return await response.json();
            } catch (error) {
                console.error("GAS Bridge Error:", error);
                throw error;
            }
        }
    }

    let currentUser = null;

    function showLoader(show) { document.getElementById('loader-overlay').style.display = show ? 'flex' : 'none'; }
    function logout() { location.reload(); }

    async function handleLogin(e) {
        e.preventDefault();
        showLoader(true);
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;

        try {
            const res = await callGAS('prosesLogin', email, pass); 
            if (res.status === 'success') {
                currentUser = res.user;
                initApp();
            } else {
                alert(res.message);
            }
        } catch (err) {
            alert("Koneksi gagal: " + err.message);
        } finally {
            showLoader(false);
        }
    }

    function initApp() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('app-page').style.display = 'block';
      document.getElementById('userNama').innerText = currentUser.nama;
      document.getElementById('userRole').innerText = currentUser.role.toUpperCase();

      if (currentUser.role === 'admin' || currentUser.role === 'superadmin') {
        document.getElementById('menu-warga').style.display = 'flex';
        document.getElementById('menu-pengaturan').style.display = 'flex';
      }
      showMenu('dashboard');
    }

    function showMenu(menuId) {
      document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      const targetView = document.getElementById('view-' + menuId);
      if(targetView) targetView.style.display = 'block';
      
      const link = Array.from(document.querySelectorAll('.nav-link')).find(a => a.getAttribute('onclick')?.includes(menuId));
      if(link) link.classList.add('active');
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
